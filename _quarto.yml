project:
  type: book
  output-dir: _book

book:
  title: "HVTI ggplot graphics recipes"
  author: "John Ehrlinger <ehrlinj@ccf.org>"
  date: today
  page-navigation: true
  page-footer:
    left: "Copyright 2025, John Ehrlinger"
    right:
      - icon: github
        href: https://github.com/ehrlinger/hvti_graphics
  chapters:
    - index.qmd
    - intro.qmd
    - part: gettingstarted.qmd
      chapters:
        - packages.qmd
        - usingR.qmd
        - data_governance.qmd
    - part: figures.qmd
      chapters:
        - scatter.qmd
        - survival.qmd
        - hazard.qmd
        - nnt.qmd
        - temporal_hazard.qmd
        - histograms.qmd
        - density.qmd
        - bar.qmd
        - boxplots.qmd
        - upset.qmd
        - spaghetti.qmd
        - postagestamp.qmd
    - part: specialty.qmd
      chapters:
        - consort.qmd
        - sankey.qmd
        - balance.qmd
        - combination.qmd
    - part: "Random forests & variable selection"
      chapters:
        - randomforests.qmd
        - rf_error.qmd
        - rf_predicted.qmd
        - rf_vimp.qmd
        - rf_dependence.qmd
        - rf_roc.qmd
        - varpro.qmd
    - part: tables.qmd
      chapters:
        - qt_tables.qmd
        - figure_tables.qmd
    - part: formatting.qmd
      chapters:
        - annotation.qmd
        - themes.qmd
        - colors.qmd
        - legends.qmd
    - part: publications.qmd
      chapters:
        - manuscripts.qmd
        - researchday.qmd
    - summary.qmd
    - references.qmd

bibliography:
  - references.bib
  - packages.bib

format:
  html:
    theme:
      - cosmo
      - brand
    number-sections: true
  pdf:
    documentclass: scrreprt
    keep-tex: true

execute:
  freeze: auto

editor: source
